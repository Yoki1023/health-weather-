<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="体調ログ">
<title>体調ログ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --ink:#f0ede8;
  --ink2:#a09a92;
  --ink3:#5a5550;
  --ink4:#38342f;
  --paper:#0e0d0b;
  --paper2:#171512;
  --paper3:#1e1c18;
  --paper4:#252320;
  --border:rgba(240,237,232,0.07);
  --border2:rgba(240,237,232,0.13);
  --border3:rgba(240,237,232,0.22);
  --gold:#b8935a;
  --gold2:#d4af7a;
  --gold3:#f0d4a0;
  --red:#c0504a;
  --orange:#c07840;
  --green:#4a9060;
  --blue:#4878a8;
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{background:var(--paper);}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;
  font-weight:300;
  min-height:100vh;
  padding-bottom:80px;
}

/* ─── 背景テクスチャ ─── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 100% 60% at 50% 0%, rgba(184,147,90,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 70% 50% at 10% 30%, rgba(72,120,168,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 90% 60%, rgba(74,144,96,0.04) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}

.wrap{max-width:640px;margin:0 auto;position:relative;z-index:1;}

/* ─── ヘッダー ─── */
.hdr{
  padding:60px 24px 36px;
  position:relative;
  overflow:hidden;
}
/* 細い金線の装飾 */
.hdr::after{
  content:'';
  position:absolute;
  bottom:0;left:24px;right:24px;
  height:1px;
  background:linear-gradient(to right, transparent, var(--gold), transparent);
  opacity:0.4;
}
.hdr-eyebrow{
  font-size:10px;
  letter-spacing:4px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.hdr-eyebrow::before{
  content:'';width:24px;height:1px;
  background:var(--gold);opacity:0.5;
}
.hdr-title{
  font-family:'Shippori Mincho',serif;
  font-size:38px;font-weight:600;
  color:var(--ink);
  line-height:1.2;
  letter-spacing:2px;
  margin-bottom:8px;
}
.hdr-title span{color:var(--gold2);}
.hdr-date{font-size:12px;color:var(--ink3);letter-spacing:2px;}

/* ─── セクション ─── */
.sec{padding:32px 24px;position:relative;}
.sec+.sec::before{
  content:'';
  position:absolute;top:0;left:24px;right:24px;height:1px;
  background:var(--border);
}
.sec-kw{
  font-size:9px;letter-spacing:5px;text-transform:uppercase;
  color:var(--ink3);margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
}
.sec-kw::after{content:'';flex:1;height:1px;background:var(--border);}

/* ─── GPS ─── */
.gps-btn{
  width:100%;padding:18px 22px;
  background:var(--paper3);
  border:1px solid var(--border2);
  border-radius:var(--r);
  color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;font-weight:300;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;
  transition:all .25s;
  letter-spacing:1px;
}
.gps-btn:hover{background:var(--paper4);border-color:var(--border3);}
.gps-btn:active{transform:scale(0.99);}
.gps-btn:disabled{opacity:.35;cursor:not-allowed;}
.gps-pip{
  width:9px;height:9px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 8px rgba(184,147,90,0.5);
  flex-shrink:0;transition:all .3s;
}
.gps-status{font-size:11px;color:var(--ink3);text-align:center;margin-top:9px;min-height:16px;letter-spacing:1px;}

/* ─── 気象ヒーロー ─── */
.wx-hero{display:none;margin-top:22px;}
.wx-hero.show{display:block;}

.wx-card{
  background:var(--paper2);
  border:1px solid var(--border2);
  border-radius:22px;
  overflow:hidden;
  margin-bottom:14px;
}
.wx-card-inner{
  padding:24px;
  display:flex;align-items:flex-end;gap:16px;
}
.wx-icon-giant{font-size:60px;line-height:1;flex-shrink:0;}
.wx-data{flex:1;}
.wx-temp-n{
  font-family:'Shippori Mincho',serif;
  font-size:72px;font-weight:600;
  color:var(--ink);line-height:1;
}
.wx-temp-n sup{
  font-size:20px;font-family:'Noto Sans JP';font-weight:300;
  color:var(--ink3);vertical-align:super;
}
.wx-cond{font-size:13px;color:var(--ink2);margin-top:5px;letter-spacing:1px;}
.wx-ts{font-size:10px;color:var(--ink4);margin-top:3px;letter-spacing:1px;}
.wx-card-bar{
  height:3px;
  background:linear-gradient(to right, var(--blue), var(--green), var(--gold), var(--orange));
  opacity:0.4;
}

.wx-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.pill{
  padding:5px 13px;border-radius:20px;
  font-size:11px;letter-spacing:0.5px;
  border:1px solid;font-family:'Noto Sans JP',sans-serif;
}
.pill-r{background:rgba(192,80,74,0.1);border-color:rgba(192,80,74,0.35);color:#e09090;}
.pill-o{background:rgba(192,120,64,0.1);border-color:rgba(192,120,64,0.35);color:#d4a870;}
.pill-b{background:rgba(72,120,168,0.1);border-color:rgba(72,120,168,0.35);color:#88b8e8;}
.pill-g{background:rgba(74,144,96,0.1);border-color:rgba(74,144,96,0.35);color:#88d8a8;}

/* メトリクス */
.mtr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.mtr{
  background:var(--paper2);border:1px solid var(--border);
  border-radius:14px;padding:14px 12px;
  position:relative;overflow:hidden;
}
.mtr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.mtr.ok::before{background:var(--green);}
.mtr.warn::before{background:var(--orange);}
.mtr.bad::before{background:var(--red);}
.mtr.neu::before{background:var(--border2);}
.mtr-ico{font-size:16px;margin-bottom:8px;display:block;}
.mtr-v{
  font-family:'Shippori Mincho',serif;
  font-size:20px;color:var(--ink);line-height:1;
}
.mtr-l{font-size:10px;color:var(--ink3);margin-top:5px;line-height:1.4;letter-spacing:0.5px;}

/* 花粉 */
.pollen{
  display:none;background:var(--paper2);
  border:1px solid rgba(192,80,74,0.18);
  border-radius:14px;padding:16px;
}
.pollen.show{display:block;}
.pollen-kw{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
.p-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.p-row:last-child{margin-bottom:0;}
.p-n{font-size:11px;color:var(--ink2);width:70px;flex-shrink:0;}
.p-tr{flex:1;height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.p-fi{height:100%;border-radius:2px;}
.p-tg{font-size:10px;padding:2px 9px;border-radius:10px;white-space:nowrap;border:1px solid;}

/* ─── スコア ─── */
.score-card{
  background:var(--paper2);
  border:1px solid var(--border2);
  border-radius:22px;padding:24px;
}
.score-row{display:flex;align-items:center;gap:20px;margin-bottom:22px;}
.score-circle{
  width:92px;height:92px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;border:1.5px solid;
  transition:all .35s cubic-bezier(0.34,1.56,0.64,1);
}
.sc-g{background:rgba(74,144,96,0.1);border-color:rgba(74,144,96,0.55);color:#80e0a8;}
.sc-m{background:rgba(192,120,64,0.1);border-color:rgba(192,120,64,0.55);color:#d4b070;}
.sc-b{background:rgba(192,80,74,0.1);border-color:rgba(192,80,74,0.55);color:#e09090;}
.sc-emoji{font-size:26px;line-height:1;}
.sc-n{font-family:'Shippori Mincho',serif;font-size:20px;line-height:1;margin-top:2px;}
.sc-right{flex:1;}
.sc-title{font-family:'Shippori Mincho',serif;font-size:23px;color:var(--ink);margin-bottom:5px;letter-spacing:1px;}
.sc-desc{font-size:12px;color:var(--ink2);line-height:1.8;letter-spacing:0.5px;}
.sc-bar-wrap{margin-top:10px;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.sc-bar{height:100%;border-radius:2px;transition:width .4s ease,background .4s ease;}

input[type=range]{
  width:100%;height:3px;
  -webkit-appearance:none;appearance:none;
  background:linear-gradient(to right,var(--green),var(--gold) 50%,var(--red));
  border-radius:2px;outline:none;cursor:pointer;
  display:block;margin:18px 0 10px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:24px;height:24px;border-radius:50%;
  background:var(--ink);border:2px solid var(--gold);
  cursor:pointer;box-shadow:0 0 12px rgba(184,147,90,0.4);
}
.ticks{display:flex;justify-content:space-between;padding:0 2px;}
.ticks span{font-size:10px;color:var(--ink4);}

/* ─── 症状ボタン ─── */
.feel-hdr{margin-top:26px;margin-bottom:6px;}
.feel-kw{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--ink3);}
.feel-note{font-size:11px;color:var(--ink3);margin-top:4px;margin-bottom:14px;line-height:1.7;letter-spacing:0.5px;}
.feel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.feel-btn{
  padding:13px 8px 11px;
  border-radius:14px;
  border:1px solid var(--border2);
  background:var(--paper3);
  color:var(--ink2);
  font-size:11px;
  cursor:pointer;transition:all .22s;
  text-align:center;
  font-family:'Noto Sans JP',sans-serif;
  outline:none;
}
.feel-btn:active{transform:scale(0.95);}
.feel-btn.on{
  background:rgba(184,147,90,0.1);
  border-color:rgba(184,147,90,0.5);
  color:var(--gold3);
  box-shadow:0 0 20px rgba(184,147,90,0.12);
}
.feel-ico{font-size:22px;display:block;margin-bottom:5px;}
.feel-nm{display:block;font-size:11px;font-weight:400;line-height:1.2;}
.feel-ds{display:block;font-size:9px;color:var(--ink3);margin-top:3px;line-height:1.3;}
.feel-btn.on .feel-ds{color:rgba(184,147,90,0.55);}

/* ─── ボタン類 ─── */
.rec-btn{
  width:100%;padding:17px;margin-top:20px;
  background:transparent;
  border:1px solid rgba(184,147,90,0.45);
  border-radius:var(--r);
  color:var(--gold2);
  font-family:'Shippori Mincho',serif;
  font-size:16px;font-weight:600;
  cursor:pointer;transition:all .25s;
  letter-spacing:4px;position:relative;overflow:hidden;
}
.rec-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(184,147,90,0.12),transparent 60%);
  opacity:0;transition:opacity .25s;
}
.rec-btn:hover::before{opacity:1;}
.rec-btn:hover{border-color:rgba(184,147,90,0.7);}
.rec-btn:active{transform:scale(0.99);}

.mgr-btn{
  width:100%;padding:12px;margin-top:10px;
  background:transparent;border:1px solid var(--border);
  border-radius:12px;color:var(--ink3);
  font-size:12px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  transition:all .2s;letter-spacing:1px;
}
.mgr-btn:hover{background:var(--paper3);color:var(--ink2);}

.hist-panel{display:none;margin-top:12px;background:var(--paper2);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
.hist-panel.show{display:block;}
.hist-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.hist-kw{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--ink3);}
.del-all{font-size:11px;color:rgba(192,80,74,0.55);cursor:pointer;background:none;border:none;font-family:'Noto Sans JP',sans-serif;padding:4px 8px;border-radius:6px;transition:all .2s;}
.del-all:hover{background:rgba(192,80,74,0.1);color:var(--red);}
.hist-row{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border);gap:12px;}
.hist-row:last-child{border-bottom:none;}
.hist-d{font-family:'Shippori Mincho',serif;font-size:14px;color:var(--ink);width:40px;flex-shrink:0;}
.hist-sc{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'Shippori Mincho',serif;flex-shrink:0;border:1px solid;}
.hist-inf{flex:1;min-width:0;}
.hist-sym{font-size:11px;color:var(--gold);margin-bottom:2px;}
.hist-wx{font-size:10px;color:var(--ink3);}
.hist-del{background:none;border:1px solid rgba(192,80,74,0.2);border-radius:8px;color:rgba(192,80,74,0.45);font-size:11px;cursor:pointer;padding:5px 10px;font-family:'Noto Sans JP',sans-serif;flex-shrink:0;transition:all .2s;}
.hist-del:hover{background:rgba(192,80,74,0.1);color:var(--red);border-color:rgba(192,80,74,0.5);}

/* ─── タブ ─── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:26px;}
.tab{
  flex:1;padding:14px 4px;border:none;background:transparent;
  color:var(--ink3);font-size:12px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .22s;letter-spacing:1.5px;
}
.tab.on{color:var(--gold2);border-bottom-color:var(--gold);}

/* グラフトグル */
.g-togs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.gtog{
  padding:5px 12px;border-radius:20px;font-size:11px;
  cursor:pointer;border:1px solid;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;background:transparent;
}
.gtog.off{opacity:.2;}
.g-sc{border-color:rgba(72,120,168,0.5);color:#88b8e8;}
.g-pr{border-color:rgba(160,140,220,0.4);color:#c0b0f8;}
.g-te{border-color:rgba(192,80,74,0.4);color:#e09090;}
.g-hu{border-color:rgba(72,168,200,0.4);color:#88d0e8;}
.g-po{border-color:rgba(184,147,90,0.4);color:var(--gold2);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.stat{background:var(--paper2);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.stat-v{font-family:'Shippori Mincho',serif;font-size:28px;color:var(--ink);}
.stat-l{font-size:9px;color:var(--ink3);margin-top:4px;letter-spacing:3px;text-transform:uppercase;}

.g-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.g-leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink3);}
.g-line{width:16px;height:2px;display:inline-block;border-radius:1px;}

/* 分析・アドバイス */
.a-blk{background:var(--paper2);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:10px;}
.a-blk.hi{border-color:rgba(192,120,64,0.3);background:rgba(192,120,64,0.04);}
.a-kw{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--ink3);margin-bottom:9px;}
.a-kw.w{color:rgba(192,120,64,0.8);}
.a-body{font-size:13px;color:var(--ink2);line-height:1.95;}

.adv-blk{display:flex;gap:14px;background:var(--paper2);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:10px;}
.adv-blk.urgent{border-color:rgba(192,80,74,0.3);background:rgba(192,80,74,0.04);}
.adv-blk.caution{border-color:rgba(192,120,64,0.3);background:rgba(192,120,64,0.04);}
.adv-ico{font-size:22px;flex-shrink:0;margin-top:1px;}
.adv-t{font-size:14px;font-weight:400;color:var(--ink);margin-bottom:4px;letter-spacing:0.5px;}
.adv-b{font-size:12px;color:var(--ink2);line-height:1.9;}

.no-data{text-align:center;padding:44px 0;color:var(--ink3);font-size:13px;line-height:2.2;letter-spacing:1px;}

/* トースト */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--paper3);border:1px solid rgba(184,147,90,0.3);
  color:var(--gold3);padding:12px 28px;border-radius:28px;
  font-size:12px;transition:transform .3s ease;z-index:999;
  white-space:nowrap;letter-spacing:1.5px;
  font-family:'Noto Sans JP',sans-serif;
}
.toast.show{transform:translateX(-50%) translateY(0);}

.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(184,147,90,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.hdr{animation:fadeUp .5s ease both;}
.sec:nth-of-type(1){animation:fadeUp .5s .08s ease both;}
.sec:nth-of-type(2){animation:fadeUp .5s .16s ease both;}
.sec:nth-of-type(3){animation:fadeUp .5s .24s ease both;}

@media(max-width:360px){
  .wx-temp-n{font-size:56px;}
  .mtr-grid{grid-template-columns:repeat(2,1fr);}
  .feel-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div class="wrap">

<!-- ヘッダー -->
<div class="hdr">
  <div class="hdr-eyebrow" id="hdrEyebrow">体調 × 気候</div>
  <div class="hdr-title" id="hdrTitle">今日の<br><span>体調記録</span></div>
  <div class="hdr-date" id="hdrDate"></div>
</div>

<!-- 気象 -->
<div class="sec">
  <div class="sec-kw">気象データ</div>
  <button class="gps-btn" id="fetchBtn" onclick="fetchByGPS()">
    <span class="gps-pip" id="gpsPip"></span>
    <span id="fetchLbl">現在地から気象を取得する</span>
  </button>
  <div class="gps-status" id="gpsSt"></div>

  <div class="wx-hero" id="wxHero">
    <div class="wx-card">
      <div class="wx-card-inner">
        <div class="wx-icon-giant" id="wxIco">🌤️</div>
        <div class="wx-data">
          <div class="wx-temp-n" id="wxTemp">--<sup>°C</sup></div>
          <div class="wx-cond" id="wxCond"></div>
          <div class="wx-ts" id="wxTs"></div>
        </div>
      </div>
      <div class="wx-card-bar"></div>
    </div>
    <div class="wx-pills" id="wxPills"></div>
    <div class="mtr-grid" id="mtrGrid"></div>
    <div class="pollen" id="pollenBox">
      <div class="pollen-kw">花粉 · アレルゲン</div>
      <div id="pollenRows"></div>
    </div>
  </div>
</div>

<!-- スコア -->
<div class="sec">
  <div class="sec-kw">今日のしんどさ</div>
  <div class="score-card">
    <div class="score-row">
      <div class="score-circle sc-m" id="scCircle">
        <span class="sc-emoji" id="scEmoji">😑</span>
        <span class="sc-n" id="scNum">5</span>
      </div>
      <div class="sc-right">
        <div class="sc-title" id="scTitle">普通</div>
        <div class="sc-desc" id="scDesc">可もなく不可もなく。いつも通り</div>
        <div class="sc-bar-wrap"><div class="sc-bar" id="scBar" style="width:44%;background:var(--gold);"></div></div>
      </div>
    </div>
    <input type="range" id="slider" min="1" max="10" step="1" value="5" oninput="onScore(+this.value)">
    <div class="ticks"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>10</span></div>
  </div>

  <div class="feel-hdr">
    <div class="feel-kw">症状・気分（複数選択可）</div>

</div>

<div class="sec">
  <div class="tabs">

      <span class="g-leg"><span class="g-line" style="background:#c05858;"></span>気温</span>
      <span class="g-leg"><span class="g-line" style="background:#4ab0d0;"></span>湿度</span>

</div>
<div class="toast" id="toast"></div>

<script>
const API_KEY='310a1db2273963a2b2552a75b5461714';
const PRESS_SCORE={up_big:-2,up_small:-1,stable:0,down_small:2,down_big:4};
const POLLEN_SCORE={none:0,low:1,mid:2,high:3,vhigh:4};
const SCORE_DATA=[null,
  {t:'絶好調',d:'元気いっぱい。体が軽く、何でもできる気がする',e:'😄',c:'sc-g'},
  {t:'とても元気',d:'体の調子がよく、気分も明るい',e:'🙂',c:'sc-g'},
  {t:'まあまあ元気',d:'特に問題なし。いつもより少しいい状態',e:'😊',c:'sc-g'},
  {t:'少し疲れ気味',d:'なんとなくだるい。でも日常はこなせる',e:'😐',c:'sc-m'},
  {t:'普通',d:'可もなく不可もなく。いつも通り',e:'😑',c:'sc-m'},
  {t:'やや重い',d:'体がだるくて集中しにくい。休憩を多めに',e:'😮‍💨',c:'sc-m'},
  {t:'かなりしんどい',d:'横になりたい。無理は絶対にしないで',e:'😩',c:'sc-b'},
  {t:'つらい',d:'日常動作がしんどい。できるだけ休んで',e:'😫',c:'sc-b'},
  {t:'とてもつらい',d:'かなり苦しい。安静にして今日は無理しないで',e:'🤒',c:'sc-b'},
  {t:'限界',d:'今すぐ横になって。何もしなくていい',e:'🤕',c:'sc-b'},
];
const FEELS=[
  {icon:'🤕',name:'頭痛',desc:'ズキズキ・重い'},
  {icon:'😴',name:'倦怠感',desc:'体がだるい・重い'},
  {icon:'🤧',name:'鼻水・鼻詰まり',desc:'アレルギー症状'},
  {icon:'👁️',name:'目のかゆみ',desc:'花粉・乾燥'},
  {icon:'🌀',name:'めまい',desc:'気圧変化の影響'},
  {icon:'😮‍💨',name:'息苦しさ',desc:'胸の圧迫感'},
  {icon:'🥶',name:'冷え・寒気',desc:'体温調節が困難'},
  {icon:'🫀',name:'動悸',desc:'心拍が気になる'},
  {icon:'😣',name:'胃腸の不調',desc:'吐き気・食欲不振'},
  {icon:'😶‍🌫️',name:'気分が重い',desc:'やる気が出ない'},
  {icon:'😊',name:'調子いい',desc:'気分も体も良好'},
  {icon:'💤',name:'強い眠気',desc:'起きていられない'},
];

function wxCode(id){
  if(id>=200&&id<300)return{l:'雷雨',i:'⛈️'};
  if(id>=300&&id<400)return{l:'霧雨',i:'🌦️'};
  if(id>=500&&id<510)return{l:'雨',i:'🌧️'};
  if(id===511)return{l:'みぞれ',i:'🌨️'};
  if(id>=512&&id<600)return{l:'強雨',i:'⛈️'};
  if(id>=600&&id<700)return{l:'雪',i:'❄️'};
  if(id>=700&&id<800)return{l:'霧',i:'🌫️'};
  if(id===800)return{l:'快晴',i:'☀️'};
  if(id===801)return{l:'晴れ',i:'🌤️'};
  if(id===802)return{l:'晴れ時々曇り',i:'⛅'};
  if(id>=803)return{l:'曇り',i:'☁️'};
  return{l:'--',i:'🌡️'};
}

const st={
  score:5,feels:new Set(),wx:null,pollen:null,
  entries:(()=>{try{return JSON.parse(localStorage.getItem('hwa_gps')||'[]');}catch(e){return [];}})(),
  chart:null
};

function init(){
  const today=new Date();
  const days=['日','月','火','水','木','金','土'];
  const m=today.getMonth()+1,d=today.getDate(),dw=days[today.getDay()];
  document.getElementById('hdrEyebrow').textContent=`${today.getFullYear()}年 — 体調と気候の記録`;
  document.getElementById('hdrTitle').innerHTML=`${m}月${d}日<br><span>の体調記録</span>`;
  document.getElementById('hdrDate').textContent=`${['月曜','火曜','水曜','木曜','金曜','土曜','日曜'][today.getDay()===0?6:today.getDay()-1]}日`;

  const fg=document.getElementById('feelGrid');
  FEELS.forEach(f=>{
    const b=document.createElement('button');
    b.className='feel-btn';
    b.innerHTML=`<span class="feel-ico">${f.icon}</span><span class="feel-nm">${f.name}</span><span class="feel-ds">${f.desc}</span>`;
    b.addEventListener('click',()=>{
      if(st.feels.has(f.name)){st.feels.delete(f.name);b.classList.remove('on');}
      else{st.feels.add(f.name);b.classList.add('on');}
    });
    fg.appendChild(b);
  });
  onScore(5);renderChart();renderAdvice();
  const cached=localStorage.getItem('hwa_wx_cache');
  if(cached){try{const o=JSON.parse(cached);if(o.date===new Date().toDateString()){applyWx(o.data);return;}}catch(e){}}
}

async function fetchByGPS(){
  const btn=document.getElementById('fetchBtn');
  const st2=document.getElementById('gpsSt');
  const lbl=document.getElementById('fetchLbl');
  const pip=document.getElementById('gpsPip');
  if(!navigator.geolocation){st2.textContent='このブラウザは位置情報に対応していません';return;}
  btn.disabled=true;
  pip.style.background='var(--orange)';pip.style.boxShadow='0 0 8px rgba(192,120,64,0.6)';
  lbl.innerHTML='<span class="spin"></span> 位置情報を取得中…';st2.textContent='';
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      const lat=pos.coords.latitude.toFixed(4);
      const lon=pos.coords.longitude.toFixed(4);
      lbl.innerHTML='<span class="spin"></span> 気象データを取得中…';
      try{
        const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=ja`);
        const d=await res.json();
        if(!d.main)throw new Error(d.message||'データ取得エラー');
        const temp=Math.round(d.main.temp);
        const humidity=Math.round(d.main.humidity);
        const code=d.weather[0].id;
        const pressure=Math.round(d.main.pressure);
        const wind=Math.round((d.wind?.speed||0)*10)/10;
        const precip=Math.round(((d.rain?.['1h']||d.rain?.['3h']||d.snow?.['1h']||0))*10)/10;
        const prev=+(localStorage.getItem('hwa_last_pressure')||pressure);
        localStorage.setItem('hwa_last_pressure',pressure);
        const diff=pressure-prev;
        let pressKey='stable';
        if(diff>=5)pressKey='up_big';else if(diff>=1)pressKey='up_small';
        else if(diff<=-5)pressKey='down_big';else if(diff<=-1)pressKey='down_small';
        const wx={code,temp,humidity,pressure,pressKey,wind,precip};
        localStorage.setItem('hwa_wx_cache',JSON.stringify({date:new Date().toDateString(),data:wx}));
        applyWx(wx);
        pip.style.background='var(--green)';pip.style.boxShadow='0 0 8px rgba(74,144,96,0.6)';
        lbl.textContent='現在地から気象を取得する';btn.disabled=false;
        st2.textContent='✓ 気象データを更新しました';toast('気象データを取得しました');
      }catch(e){
        pip.style.background='var(--red)';lbl.textContent='現在地から気象を取得する';btn.disabled=false;
        st2.textContent='取得エラー: '+e.message;
      }
    },
    err=>{
      pip.style.background='var(--red)';lbl.textContent='現在地から気象を取得する';btn.disabled=false;
      st2.textContent={1:'位置情報の許可が必要です',2:'位置情報を取得できませんでした',3:'タイムアウトしました'}[err.code]||err.message;
    },
    {timeout:10000,maximumAge:300000,enableHighAccuracy:false}
  );
}

function applyWx(w){
  st.wx=w;
  document.getElementById('wxHero').classList.add('show');
  document.getElementById('wxIco').textContent=wxCode(w.code).i;
  document.getElementById('wxTemp').innerHTML=`${w.temp}<sup>°C</sup>`;
  document.getElementById('wxCond').textContent=wxCode(w.code).l+'　湿度 '+w.humidity+'%';
  document.getElementById('wxTs').textContent='OpenWeatherMap — '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+'取得';

  const pp=document.getElementById('wxPills');pp.innerHTML='';
  const aP=(t,c)=>{const s=document.createElement('span');s.className='pill '+c;s.textContent=t;pp.appendChild(s);};
  if(w.pressKey==='down_big')aP('🌀 気圧 大きく低下','pill-r');
  else if(w.pressKey==='down_small')aP('🌀 気圧 やや低下','pill-o');
  else if(w.pressKey==='up_big')aP('🌀 気圧 上昇中','pill-g');
  if(w.humidity<=35)aP('💨 乾燥注意','pill-o');
  if(w.humidity>=75)aP('💧 高湿度','pill-o');
  if(w.temp>=32)aP('🥵 熱中症注意','pill-r');
  if(w.precip>0)aP(`☔ 雨 ${w.precip}mm`,'pill-b');
  aP(`💨 ${w.wind}m/s`,'pill-b');

  const PL={up_big:'大きく上昇',up_small:'少し上昇',stable:'安定',down_small:'少し下降',down_big:'大きく下降'};
  const pc=w.pressKey==='down_big'?'bad':w.pressKey==='down_small'?'warn':'ok';
  const hc=w.humidity>=70||w.humidity<=35?'warn':'ok';
  document.getElementById('mtrGrid').innerHTML=`
    <div class="mtr ${hc}"><span class="mtr-ico">💧</span><div class="mtr-v">${w.humidity}%</div><div class="mtr-l">湿度<br>${w.humidity>=70?'高湿度':w.humidity<=35?'乾燥':'快適'}</div></div>
    <div class="mtr ${pc}"><span class="mtr-ico">🌀</span><div class="mtr-v" style="font-size:15px;">${w.pressure}<span style="font-size:9px;font-family:'Noto Sans JP'"> hPa</span></div><div class="mtr-l">気圧<br>${PL[w.pressKey]}</div></div>
    <div class="mtr neu"><span class="mtr-ico">💨</span><div class="mtr-v">${w.wind}<span style="font-size:9px;font-family:'Noto Sans JP'"> m/s</span></div><div class="mtr-l">風速<br>${w.wind>=10?'強風':w.wind>=5?'やや強':'穏やか'}</div></div>
    <div class="mtr ${w.precip>0?'warn':'ok'}"><span class="mtr-ico">🌂</span><div class="mtr-v">${w.precip}<span style="font-size:9px;font-family:'Noto Sans JP'"> mm</span></div><div class="mtr-l">降水量<br>${w.precip>5?'傘必要':w.precip>0?'小雨':'なし'}</div></div>
    <div class="mtr neu"><span class="mtr-ico">🌡️</span><div class="mtr-v">${w.temp}<span style="font-size:9px;font-family:'Noto Sans JP'">°C</span></div><div class="mtr-l">気温<br>${w.temp>30?'猛暑':w.temp>25?'夏日':w.temp>15?'快適':w.temp>5?'やや寒':'寒い'}</div></div>
    <div class="mtr neu"><span class="mtr-ico">${wxCode(w.code).i}</span><div class="mtr-v" style="font-size:12px;color:var(--ink2);font-family:'Noto Sans JP';">${wxCode(w.code).l}</div><div class="mtr-l">天気</div></div>
  `;
  renderPollen(new Date().getMonth()+1,w.temp,w.code);
  renderAdvice();
}

function renderPollen(month,temp,code){
  const sunny=code<=802,rainy=code>=500&&code<600,warm=temp>=12;
  const lv={cedar:{n:'🌲 スギ',v:'none'},cypress:{n:'🌿 ヒノキ',v:'none'},grass:{n:'🌾 イネ科',v:'none'},ragweed:{n:'🌼 ブタクサ',v:'none'}};
  if(month===2){lv.cedar.v=warm?'high':'mid';}
  else if(month===3){lv.cedar.v=rainy?'mid':'vhigh';lv.cypress.v=sunny?'mid':'low';}
  else if(month===4){lv.cedar.v=rainy?'mid':'high';lv.cypress.v=rainy?'low':'vhigh';}
  else if(month===5){lv.cedar.v='low';lv.cypress.v='mid';lv.grass.v=warm?'mid':'low';}
  else if(month===6){lv.grass.v=sunny?'high':'mid';}
  else if(month===7||month===8){lv.grass.v='low';lv.ragweed.v='low';}
  else if(month===9){lv.ragweed.v=sunny?'vhigh':'high';lv.grass.v='mid';}
  else if(month===10){lv.ragweed.v='mid';}
  st.pollen=lv;
  const M={
    none:{l:'なし',w:'4%',c:'rgba(74,144,96,0.6)',tc:'rgba(74,144,96,0.85)',bg:'rgba(74,144,96,0.07)'},
    low:{l:'少ない',w:'20%',c:'rgba(74,144,96,0.85)',tc:'rgba(74,144,96,0.9)',bg:'rgba(74,144,96,0.07)'},
    mid:{l:'やや多い',w:'50%',c:'rgba(192,120,64,0.9)',tc:'rgba(192,120,64,0.9)',bg:'rgba(192,120,64,0.07)'},
    high:{l:'多い',w:'78%',c:'rgba(192,100,50,0.9)',tc:'rgba(192,100,50,0.9)',bg:'rgba(192,100,50,0.07)'},
    vhigh:{l:'極めて多い',w:'100%',c:'rgba(192,80,74,0.95)',tc:'rgba(192,80,74,0.9)',bg:'rgba(192,80,74,0.07)'},
  };
  const allNone=Object.values(lv).every(e=>e.v==='none');
  const box=document.getElementById('pollenBox');
  document.getElementById('pollenRows').innerHTML=allNone?
    `<div style="font-size:11px;color:var(--ink3);letter-spacing:1px;">今の時季は主要花粉の飛散がほぼありません</div>`:
    Object.values(lv).map(e=>{const m=M[e.v];return `<div class="p-row"><span class="p-n">${e.n}</span><div class="p-tr"><div class="p-fi" style="width:${m.w};background:${m.c};"></div></div><span class="p-tg" style="background:${m.bg};color:${m.tc};border-color:${m.c};">${m.l}</span></div>`;}).join('');
  box.classList.add('show');
}

function onScore(v){
  st.score=v;const m=SCORE_DATA[v];
  document.getElementById('scCircle').className='score-circle '+m.c;
  document.getElementById('scEmoji').textContent=m.e;
  document.getElementById('scNum').textContent=v;
  document.getElementById('scTitle').textContent=m.t;
  document.getElementById('scDesc').textContent=m.d;
  const bar=document.getElementById('scBar');
  bar.style.width=((v-1)/9*100).toFixed(0)+'%';
  bar.style.background=v<=3?'var(--green)':v<=6?'var(--gold)':'var(--red)';
}

function saveEntry(){
  const today=new Date();const ds=`${today.getMonth()+1}/${today.getDate()}`;
  const entry={
    date:ds,score:st.score,feels:[...st.feels],
    weather:st.wx?wxCode(st.wx.code).l:'未記録',
    temp:st.wx?st.wx.temp:null,humidity:st.wx?st.wx.humidity:null,
    pressure:st.wx?st.wx.pressure:null,pressKey:st.wx?st.wx.pressKey:'stable',
    pollen:st.pollen?Object.values(st.pollen).sort((a,b)=>POLLEN_SCORE[b.v]-POLLEN_SCORE[a.v])[0].v:'none',
    ts:Date.now()
  };
  const idx=st.entries.findIndex(e=>e.date===ds);
  if(idx>=0)st.entries[idx]=entry;else st.entries.push(entry);
  if(st.entries.length>30)st.entries=st.entries.slice(-30);
  try{localStorage.setItem('hwa_gps',JSON.stringify(st.entries));}catch(e){}
  toast('記録しました');
  renderChart();renderAnalysis();renderAdvice();
  if(document.getElementById('histPanel').classList.contains('show'))renderHist();
}

function showTab(name,btn){
  ['chart','analysis','advice'].forEach(n=>{document.getElementById('p'+n[0].toUpperCase()+n.slice(1)).style.display=n===name?'':'none';});
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  if(name==='analysis')renderAnalysis();if(name==='advice')renderAdvice();
}

function toggleGraph(idx,btn){
  if(!st.chart)return;
  st.chart.data.datasets[idx].hidden=!st.chart.data.datasets[idx].hidden;
  btn.classList.toggle('off',st.chart.data.datasets[idx].hidden);st.chart.update();
}

function toggleHist(){
  const p=document.getElementById('histPanel');if(p.classList.toggle('show'))renderHist();
}

function renderHist(){
  const p=document.getElementById('histPanel');
  const E=[...st.entries].reverse();
  if(!E.length){p.innerHTML='<div style="padding:20px;text-align:center;font-size:13px;color:var(--ink3);letter-spacing:1px;">記録がありません</div>';return;}
  const sc=s=>s<=3?'rgba(74,144,96,0.15)':s<=6?'rgba(192,120,64,0.15)':'rgba(192,80,74,0.15)';
  const tc=s=>s<=3?'var(--green)':s<=6?'var(--orange)':'var(--red)';
  p.innerHTML=`
    <div class="hist-hdr">
      <span class="hist-kw">記録一覧（${E.length}件）</span>
      <button class="del-all" onclick="deleteAll()">すべて削除</button>
    </div>
    ${E.map(e=>`
    <div class="hist-row">
      <div class="hist-d">${e.date}</div>
      <div class="hist-sc" style="background:${sc(e.score)};color:${tc(e.score)};border-color:${tc(e.score)};">${e.score}</div>
      <div class="hist-inf">
        <div class="hist-sym">${e.feels&&e.feels.length?e.feels.join(' · '):'症状なし'}</div>
        <div class="hist-wx">${e.weather||'--'}${e.temp!=null?' · '+e.temp+'°C':''}${e.humidity!=null?' · '+e.humidity+'%':''}</div>
      </div>
      <button class="hist-del" onclick="deleteEntry(${e.ts})">削除</button>
    </div>`).join('')}
  `;
}

function deleteEntry(ts){
  st.entries=st.entries.filter(e=>e.ts!==ts);
  try{localStorage.setItem('hwa_gps',JSON.stringify(st.entries));}catch(e){}
  if(st.chart){st.chart.destroy();st.chart=null;}
  document.getElementById('statsRow').style.display='none';
  renderChart();renderAnalysis();renderAdvice();renderHist();toast('削除しました');
}

function deleteAll(){
  if(!confirm('全データを削除しますか？この操作は取り消せません。'))return;
  st.entries=[];
  if(st.chart){st.chart.destroy();st.chart=null;}
  localStorage.removeItem('hwa_gps');
  document.getElementById('statsRow').style.display='none';
  renderChart();renderAnalysis();renderAdvice();renderHist();toast('全データを削除しました');
}

function renderChart(){
  const E=st.entries;const sr=document.getElementById('statsRow');
  if(!E.length){sr.style.display='none';return;}
  sr.style.display='grid';
  const avg=(E.reduce((s,e)=>s+e.score,0)/E.length).toFixed(1);
  sr.innerHTML=`
    <div class="stat"><div class="stat-v">${avg}</div><div class="stat-l">平均</div></div>
    <div class="stat"><div class="stat-v">${Math.min(...E.map(e=>e.score))}</div><div class="stat-l">最良</div></div>
    <div class="stat"><div class="stat-v">${Math.max(...E.map(e=>e.score))}</div><div class="stat-l">最悪</div></div>
  `;
  if(st.chart){st.chart.destroy();st.chart=null;}
  const scores=E.map(e=>e.score);
  st.chart=new Chart(document.getElementById('mc').getContext('2d'),{
    type:'line',
    data:{labels:E.map(e=>e.date),datasets:[
      {label:'しんどさ',data:scores,borderColor:'#4878a8',backgroundColor:'rgba(72,120,168,0.07)',fill:true,tension:0.4,borderWidth:2,pointBackgroundColor:scores.map(s=>s<=3?'#4a9060':s<=6?'#b8935a':'#c0504a'),pointRadius:4,pointHoverRadius:6,yAxisID:'y'},
      {label:'気圧変化',data:E.map(e=>PRESS_SCORE[e.pressKey]||0),borderColor:'#a090e8',borderDash:[4,3],borderWidth:1.5,pointRadius:2,fill:false,tension:0.3,yAxisID:'y'},
      {label:'気温(°C)',data:E.map(e=>e.temp),borderColor:'#c05858',borderWidth:1.5,tension:0.4,pointRadius:2,fill:false,yAxisID:'y2'},
      {label:'湿度(%)',data:E.map(e=>e.humidity),borderColor:'#4ab0d0',borderDash:[2,2],borderWidth:1.5,pointRadius:2,fill:false,tension:0.3,yAxisID:'y2'},
      {label:'花粉',data:E.map(e=>e.pollen?POLLEN_SCORE[e.pollen]*2.5:null),borderColor:'#b8935a',borderDash:[5,3],borderWidth:1.5,pointRadius:2,fill:false,tension:0.3,yAxisID:'y2'},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#1e1c18',titleColor:'#f0ede8',bodyColor:'#a09a92',
        borderColor:'rgba(184,147,90,0.2)',borderWidth:1,
        callbacks:{label:ctx=>{
          const v=ctx.parsed.y;
          if(ctx.dataset.label==='気圧変化'){const m={'-2':'↑↑大きく上昇','-1':'↑少し上昇','0':'→安定','2':'↓少し下降','4':'↓↓大きく下降'};return '気圧: '+(m[v]||v);}
          if(ctx.dataset.label==='花粉')return '花粉: '+['なし','少ない','やや多い','多い','極めて多い'][Math.round(v/2.5)];
          if(ctx.dataset.label==='湿度(%)')return '湿度: '+v+'%';
          if(ctx.dataset.label==='気温(°C)')return '気温: '+v+'°C';
          if(ctx.dataset.label==='しんどさ')return 'しんどさ: '+v;
          return ctx.dataset.label+': '+v;
        }}
      }},
      scales:{
        x:{ticks:{color:'#5a5550',font:{size:10},maxTicksLimit:10,maxRotation:0},grid:{color:'rgba(240,237,232,0.04)'},border:{color:'rgba(240,237,232,0.06)'}},
        y:{min:-1,max:11,ticks:{color:'#5a5550',font:{size:10},stepSize:2,callback:v=>(v>=1&&v<=10)?v:''},grid:{color:'rgba(240,237,232,0.04)'},border:{color:'rgba(240,237,232,0.06)'}},
        y2:{position:'right',min:0,max:100,ticks:{color:'#5a5550',font:{size:10},stepSize:25},grid:{display:false},border:{color:'rgba(240,237,232,0.04)'}}
      }
    }
  });
}

function renderAnalysis(){
  const el=document.getElementById('pAnalysis');const E=st.entries;
  if(E.length<3){el.innerHTML='<div class="no-data">3日以上記録すると<br>相関分析が表示されます</div>';return;}
  let html='';
  const down=E.filter(e=>e.pressKey==='down_big'||e.pressKey==='down_small');
  const stb=E.filter(e=>e.pressKey==='stable'||e.pressKey==='up_small'||e.pressKey==='up_big');
  if(down.length>=2&&stb.length>=2){
    const ad=(down.reduce((s,e)=>s+e.score,0)/down.length).toFixed(1);
    const as=(stb.reduce((s,e)=>s+e.score,0)/stb.length).toFixed(1);
    const d=parseFloat(ad)-parseFloat(as);
    html+=`<div class="a-blk ${d>1?'hi':''}"><div class="a-kw ${d>1?'w':''}">気圧との相関</div><div class="a-body">気圧低下日 平均 <strong style="color:var(--orange)">${ad}</strong> / 安定日 平均 <strong style="color:var(--green)">${as}</strong>${d>1?' — 低気圧で体調が悪化する傾向があります':''}</div></div>`;
  }
  const he=E.filter(e=>e.humidity!=null);
  if(he.length>=4){
    const hi=he.filter(e=>e.humidity>=70),lo=he.filter(e=>e.humidity<=45);
    if(hi.length>=2&&lo.length>=2){
      const ah=(hi.reduce((s,e)=>s+e.score,0)/hi.length).toFixed(1);
      const al=(lo.reduce((s,e)=>s+e.score,0)/lo.length).toFixed(1);
      const d=parseFloat(ah)-parseFloat(al);
      html+=`<div class="a-blk ${d>1?'hi':''}"><div class="a-kw ${d>1?'w':''}">湿度との相関</div><div class="a-body">高湿度日 平均 <strong style="color:var(--orange)">${ah}</strong> / 低湿度日 平均 <strong style="color:var(--green)">${al}</strong>${d>1?' — 高湿度日に体調悪化の傾向あり':''}</div></div>`;
    }
  }
  const fm={};
  E.filter(e=>e.feels&&e.feels.length).forEach(e=>e.feels.forEach(f=>{if(!fm[f]){fm[f]={t:0,c:0};}fm[f].t+=e.score;fm[f].c++;}));
  const fa=Object.entries(fm).sort((a,b)=>b[1].t/b[1].c-a[1].t/a[1].c);
  if(fa.length>=2){
    const worst=fa.filter(e=>e[1].t/e[1].c>=6);
    const best=fa.filter(e=>e[1].t/e[1].c<=4);
    if(worst.length)html+=`<div class="a-blk hi"><div class="a-kw w">しんどい日の症状</div><div class="a-body">「${worst.map(e=>e[0]).join('」「')}」が出る日は体調が特に悪い傾向（平均 ${(worst[0][1].t/worst[0][1].c).toFixed(1)}）</div></div>`;
    if(best.length)html+=`<div class="a-blk"><div class="a-kw">調子がいい日の傾向</div><div class="a-body">「${best.map(e=>e[0]).join('」「')}」を選んだ日は体調が比較的よい傾向があります</div></div>`;
  }
  if(!html)html='<div class="no-data">分析データが不足しています</div>';
  el.innerHTML=html;
}

function renderAdvice(){
  const el=document.getElementById('pAdvice');
  const score=st.score;const wx=st.wx;const advs=[];
  if(score>=8){
    advs.push({icon:'🫁',t:'4-8呼吸法でリセット',b:'4秒吸って8秒かけて吐く呼吸を3回。副交感神経を優位にして倦怠感を和らげます。',c:'urgent'});
    advs.push({icon:'🛌',t:'今日は休息最優先',b:'無理に動こうとせず、横になるだけでも体の回復を助けます。',c:'urgent'});
  }else if(score>=5){
    advs.push({icon:'🚶',t:'軽い散歩で血流を促して',b:'10〜15分のゆっくりした歩きが効果的。無理のない範囲で。',c:''});
  }else{
    advs.push({icon:'✨',t:'体調良好 — 今日を記録しよう',b:'調子がいい日の条件を記録しておくと、悪い日との比較に役立ちます。',c:''});
  }
  if(wx){
    if(wx.pressKey==='down_big')advs.push({icon:'🧘',t:'気圧が大きく下降中',b:'自律神経が乱れやすい状態です。首・肩のストレッチ、温かい飲み物、頭痛薬は早めに。',c:'urgent'});
    else if(wx.pressKey==='down_small')advs.push({icon:'🌀',t:'気圧がやや低下中',b:'軽い頭重感や眠気が出やすいです。こまめに休憩を挟みましょう。',c:'caution'});
    if(wx.humidity<=35)advs.push({icon:'🌬️',t:'乾燥注意',b:'喉・鼻の粘膜が乾燥しやすい日。マスクとこまめな水分補給を。',c:'caution'});
    if(wx.humidity>=75)advs.push({icon:'💧',t:'高湿度 — こまめな水分補給を',b:'体温調節に余分なエネルギーを使います。冷房を活用して。',c:'caution'});
    if(wx.temp>=32)advs.push({icon:'🥵',t:'熱中症リスクが高い日',b:'30分ごとに水分補給、日陰での休憩を。体感でしんどくなくても急に来ます。',c:'urgent'});
    if(st.pollen){
      const high=Object.values(st.pollen).filter(p=>p.v==='high'||p.v==='vhigh');
      if(high.length>0)advs.push({icon:'🌸',t:high.map(p=>p.n).join('・')+'の花粉が多い',b:'外出時は必ずマスク・花粉用眼鏡を。帰宅後すぐ洗顔・うがいを。',c:'caution'});
    }
    if(wx.precip>3)advs.push({icon:'☔',t:'雨の日のメンタルケア',b:'日照不足でセロトニンが下がりやすい日。照明を明るくする・温かい飲み物で気分を上げましょう。',c:''});
  }else{
    advs.push({icon:'📍',t:'まず気象データを取得してください',b:'上のボタンから現在地の気象を取得すると、より詳しいアドバイスが表示されます。',c:''});
  }
  el.innerHTML=advs.map(a=>`<div class="adv-blk ${a.c}"><span class="adv-ico">${a.icon}</span><div><div class="adv-t">${a.t}</div><div class="adv-b">${a.b}</div></div></div>`).join('');
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
init();
</script>
